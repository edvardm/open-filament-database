name: Frontend Tests

on:
  pull_request:
    paths:
      - 'webui/**'
  push:
    branches: [main]
    paths:
      - 'webui/**'

permissions:
  contents: read

jobs:
  test-frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - name: Install Playwright browsers
        working-directory: webui
        run: pnpm run test:install

      - name: Run tests
        working-directory: webui
        run: pnpm test

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: webui/playwright-report/
          retention-days: 30
